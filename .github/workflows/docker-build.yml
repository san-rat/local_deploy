name: Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Validate Docker stack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Run backend tests
        run: dotnet test backend/LocalDeploy.Api.Tests/LocalDeploy.Api.Tests.csproj --configuration Release

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Validate production Docker Compose file
        run: docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build backend image
        run: docker build -t localdeploy-backend ./backend

      - name: Build activity service image
        run: docker build -t localdeploy-activity-service ./services/activity-service

      - name: Build frontend and Nginx image
        run: docker build -t localdeploy-nginx ./frontend
