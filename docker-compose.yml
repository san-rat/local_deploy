services:
  backend:
    build:
      context: ./backend
    container_name: localdeploy-backend
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: localdeploydb
      DB_USER: localdeploy_user
      DB_PASSWORD: localdeploy_password
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      - database
    networks:
      - localdeploy_network

  database:
    image: postgres:16-alpine
    container_name: localdeploy-database
    environment:
      POSTGRES_DB: localdeploydb
      POSTGRES_USER: localdeploy_user
      POSTGRES_PASSWORD: localdeploy_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - localdeploy_network

volumes:
  postgres_data:

networks:
  localdeploy_network:
