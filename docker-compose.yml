services:
  nginx:
    build:
      context: ./frontend
    container_name: localdeploy-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - localdeploy_network

  backend:
    build:
      context: ./backend
    container_name: localdeploy-backend
    environment:
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-localdeploydb}
      DB_USER: ${DB_USER:-localdeploy_user}
      DB_PASSWORD: ${DB_PASSWORD:-localdeploy_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_CACHE_SECONDS: ${REDIS_CACHE_SECONDS:-60}
      ASPNETCORE_URLS: http://+:8080
      ENABLE_SWAGGER: "true"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - localdeploy_network

  redis:
    image: redis:7-alpine
    container_name: localdeploy-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - localdeploy_network

  database:
    image: postgres:16-alpine
    container_name: localdeploy-database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-localdeploydb}
      POSTGRES_USER: ${POSTGRES_USER:-localdeploy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdeploy_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - localdeploy_network

volumes:
  postgres_data:

networks:
  localdeploy_network:
