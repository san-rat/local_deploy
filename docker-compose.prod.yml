services:
  nginx:
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro

  backend:
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:?DB_HOST is required for production Compose}
      DB_PORT: ${DB_PORT:?DB_PORT is required for production Compose}
      DB_NAME: ${DB_NAME:?DB_NAME is required for production Compose}
      DB_USER: ${DB_USER:?DB_USER is required for production Compose}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required for production Compose}
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required for production Compose}
      REDIS_PORT: ${REDIS_PORT:?REDIS_PORT is required for production Compose}
      REDIS_CACHE_SECONDS: ${REDIS_CACHE_SECONDS:-60}
      ASPNETCORE_ENVIRONMENT: Production
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}

  redis:
    restart: unless-stopped

  database:
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required for production Compose}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required for production Compose}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production Compose}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_prod_data:
